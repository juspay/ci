name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - run: |
          nix develop -c bash -c '
            set -euo pipefail
            nix run . > pc.yaml
            process-compose -f pc.yaml -t=false up
          '
